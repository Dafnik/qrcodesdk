name: release package

on:
  workflow_call:
    inputs:
      lib:
        description: Package short name to publish.
        required: true
        type: string

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for GitHub release action

jobs:
  release:
    name: Release ${{ inputs.lib }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dafnik/setup-node-pnpm@v5
        with:
          install-ignore-scripts: true

      - name: Resolve package
        id: package
        shell: bash
        run: |
          case "${{ inputs.lib }}" in
            angular)
              package_name="@qrcodesdk/angular"
              package_dir="packages/angular"
              ;;
            browser)
              package_name="@qrcodesdk/browser"
              package_dir="packages/browser"
              ;;
            cli)
              package_name="@qrcodesdk/cli"
              package_dir="packages/cli"
              ;;
            core)
              package_name="@qrcodesdk/core"
              package_dir="packages/core"
              ;;
            node)
              package_name="@qrcodesdk/node"
              package_dir="packages/node"
              ;;
            react)
              package_name="@qrcodesdk/react"
              package_dir="packages/react"
              ;;
            *)
              echo "Unknown package: ${{ inputs.lib }}" >&2
              exit 1
              ;;
          esac

          package_version="$(node -p "require('./${package_dir}/package.json').version")"

          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "dir=${package_dir}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Build package graph
        run: pnpm turbo run build --filter='${{ steps.package.outputs.name }}...'

      - name: Check npm version
        id: npm
        shell: bash
        run: |
          if npm view '${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}' version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack package
        if: steps.npm.outputs.published == 'false'
        id: pack
        shell: bash
        run: |
          pack_dir="$(mktemp -d)"
          pnpm -C '${{ steps.package.outputs.dir }}' pack --pack-destination "$pack_dir"
          tarball="$(find "$pack_dir" -maxdepth 1 -name '*.tgz' -print -quit)"

          if [ -z "$tarball" ]; then
            echo "No package tarball was created." >&2
            exit 1
          fi

          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - name: Publish package
        if: steps.npm.outputs.published == 'false'
        run: npm publish '${{ steps.pack.outputs.tarball }}' --access public --provenance
